# One-Timer Shot Technique — Coaching Knowledge Base
# ==================================================
# Basic technique definitions. Derek: specialize these.
#
# NOTE: Full one-timer analysis would ideally detect the pass arrival
# and shot timing. For now, body mechanics only — stance, rotation,
# weight transfer. A custom OnTimerDetector could be added later.

technique:
  name: one_timer
  display_name: "One-Timer"
  description: "One-timer shot body mechanics — setup, hip rotation, weight transfer, and timing position"

  detection:
    detector: FrameByFrame
    params:
      min_visibility: 0.5
      analyze_sides: both

  checks:
    knee_angle:
      display_name: "Stance"
      type: angle
      angle_function: knee_angle
      per_side: true
      # One-timer needs wide, stable, athletic stance
      good_range: [95, 140]
      warning_range: [80, 155]
      feedback:
        good: "Good athletic stance for one-timer"
        warning: "Need more knee bend -- one-timers require a stable platform"
        poor: "Standing too tall -- will whiff or mishit the one-timer"
      drills:
        warning:
          - name: "Stationary One-Timer Setup"
            description: "Practice getting into one-timer stance without a pass. Hold position."
            cue: "Knees bent, weight even, stick loaded -- be READY before the pass arrives"
        poor:
          - name: "Wall Sit One-Timer Position"
            description: "Hold wall sit in one-timer stance, stick in shooting position"
            cue: "If you cannot hold this position, you cannot shoot from it"
      annotation:
        joint: "{side}_knee"
        short_label: "STANCE"

    hip_angle:
      display_name: "Hip Rotation"
      type: angle
      angle_function: hip_angle
      per_side: true
      # Hips must rotate through -- this is where one-timer power comes from
      good_range: [60, 120]
      warning_range: [45, 140]
      feedback:
        good: "Hips driving through the one-timer -- good power"
        warning: "More hip rotation needed -- hips initiate, shoulders follow"
        poor: "No hip rotation -- arms-only one-timer has no power"
      drills:
        warning:
          - name: "Hip Door Hinge Drill"
            description: "Think of front hip as a door hinge. Hip opens first, shoulders follow like the door."
            cue: "Hip opens, then the door swings -- hip leads EVERYTHING"
        poor:
          - name: "No-Stick Rotation Drill"
            description: "Practice one-timer motion with NO stick. Just rotate hips and shoulders."
            cue: "Feel hips snap open, shoulders whip through -- this is where power lives"
      annotation:
        joint: "{side}_hip"
        short_label: "HIPS"

    forward_lean:
      display_name: "Torso Over Puck"
      type: angle
      angle_function: forward_lean_angle
      per_side: false
      good_range: [20, 55]
      warning_range: [10, 65]
      feedback:
        good: "Good torso position over the puck"
        warning: "Adjust torso angle -- need to be over the puck"
        poor: "Too upright or too hunched -- puck will go high or into the ice"
      drills:
        warning:
          - name: "Freeze Frame Drill"
            description: "Take one-timer, freeze on follow-through. Check: are you over where the puck was?"
            cue: "If you are leaning back, the puck goes high. Over the puck = in the net."
      annotation:
        joint: "left_shoulder"
        short_label: "TORSO"

    trunk_alignment:
      display_name: "Balance Through Shot"
      type: angle
      angle_function: trunk_alignment
      per_side: false
      good_range: [-15, 15]
      warning_range: [-25, 25]
      feedback:
        good: "Balanced through the one-timer"
        warning: "Falling off-balance during one-timer"
        poor: "Significant balance loss -- will miss or mishit consistently"
      drills:
        warning:
          - name: "Slow-Motion One-Timers"
            description: "Have partner feed SLOW passes. Focus on balanced contact, not power."
            cue: "Contact first, power later -- you cannot hit what you cannot reach"
        poor:
          - name: "Tee-Ball One-Timers"
            description: "Place puck on a tee (or just stationary). Practice one-timer swing from setup position."
            cue: "If you cannot hit a stationary puck cleanly, you cannot hit a moving one"
      annotation:
        joint: "left_shoulder"
        short_label: "BALANCE"

    hand_separation:
      display_name: "Hand Spacing"
      type: angle
      angle_function: hand_separation
      per_side: false
      # One-timer needs bottom hand low enough to create shaft flex
      good_range: [0.8, 2.0]
      warning_range: [0.5, 2.5]
      feedback:
        good: "Good hand spacing -- bottom hand positioned for flex"
        warning: "Hand spacing off -- bottom hand should be lower for more flex"
        poor: "Hands too close together -- cannot load the stick"
      drills:
        warning:
          - name: "Low Bottom Hand Drill"
            description: "Practice one-timer with bottom hand intentionally lower than normal"
            cue: "Bottom hand is the driver -- position it low enough to flex the shaft"
      annotation:
        joint: "right_wrist"
        short_label: "HANDS"

  coaching_notes:
    - "Hips initiate the shot -- think of front hip as a door hinge, shoulders are the door"
    - "Front skate points toward target as puck arrives (for right-handed: left skate to target)"
    - "Contact puck at middle to heel of blade for best power and control"
    - "Top hand stays relaxed until contact -- death grip before contact kills flex"
    - "Bottom hand is the driver -- positioned low enough to create shaft flex"
    - "Weight shifts from back foot to front foot THROUGH the shot, not before"
    - "Eyes track the puck from pass to blade -- like a batter watching the ball"
    - "Training progression: 6-10 weeks -- setup only, then add weight transfer, then timing"
    - "The hardest shot to master -- timing is everything"

  settings:
    min_visibility: 0.5
    analyze_sides: both
