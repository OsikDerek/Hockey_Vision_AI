# Wrist Shot Technique — Coaching Knowledge Base
# ===============================================
# Basic technique definitions. Derek: specialize these thresholds
# and add drills based on your coaching expertise.
#
# NOTE: Full wrist shot analysis will eventually need stick/puck tracking
# (object detection). For now, body mechanics only — posture, weight
# transfer, trunk rotation, and follow-through can all be detected
# from pose estimation alone.

technique:
  name: wrist_shot
  display_name: "Wrist Shot"
  description: "Wrist shot body mechanics — weight transfer, trunk rotation, and follow-through"

  detection:
    detector: FrameByFrame
    params:
      min_visibility: 0.5
      analyze_sides: both

  checks:
    knee_angle:
      display_name: "Knee Bend"
      type: angle
      angle_function: knee_angle
      per_side: true
      # Shooting requires stable base -- moderate knee bend
      good_range: [100, 140]
      warning_range: [85, 155]
      feedback:
        good: "Stable base -- good shooting stance"
        warning: "Adjust knee bend for better stability and power transfer"
        poor: "Unstable base -- losing power in the shot"
      drills:
        warning:
          - name: "Shooting Stance Holds"
            description: "Get in shooting position, hold for 5 seconds before releasing"
            cue: "Feel your weight on your back foot -- that is where the power starts"
        poor:
          - name: "Off-Ice Shooting Stance Squats"
            description: "Practice getting into and holding shooting stance off-ice with a stick"
            cue: "Bend your knees, feel the weight shift -- power comes from the ground up"
      annotation:
        joint: "{side}_knee"
        short_label: "BASE"

    hip_angle:
      display_name: "Hip Rotation"
      type: angle
      angle_function: hip_angle
      per_side: true
      good_range: [65, 120]
      warning_range: [50, 140]
      feedback:
        good: "Good hip engagement in shot"
        warning: "More hip rotation needed -- power comes from core rotation"
        poor: "Arms-only shot -- engage hips for more power"
      drills:
        warning:
          - name: "No-Puck Rotation Drill"
            description: "Practice shooting motion without puck, focusing on feeling hip rotation"
            cue: "Your belly button should rotate toward the target"
        poor:
          - name: "Medicine Ball Rotation Throws"
            description: "Off-ice: throw medicine ball from shooting stance, focusing on hip-to-shoulder rotation chain"
            cue: "Power goes from feet to hips to shoulders to hands -- feel the chain"
      annotation:
        joint: "{side}_hip"
        short_label: "HIPS"

    forward_lean:
      display_name: "Torso Angle"
      type: angle
      angle_function: forward_lean_angle
      per_side: false
      # Moderate forward lean during shot
      good_range: [20, 50]
      warning_range: [10, 60]
      feedback:
        good: "Good torso position for shooting"
        warning: "Adjust torso angle -- too upright or too hunched"
        poor: "Torso position hurting shot power and accuracy"
      drills:
        warning:
          - name: "Target Shooting with Focus on Form"
            description: "Shoot at targets slowly, focusing on keeping shoulders driving through the shot"
            cue: "Shoulders drive toward the target on follow-through"
      annotation:
        joint: "left_shoulder"
        short_label: "TORSO"

    trunk_alignment:
      display_name: "Weight Transfer"
      type: angle
      angle_function: trunk_alignment
      per_side: false
      # Some lateral lean is expected during weight transfer
      good_range: [-12, 12]
      warning_range: [-20, 20]
      feedback:
        good: "Good weight transfer through the shot"
        warning: "Weight transfer could be more controlled"
        poor: "Off-balance during shot -- losing accuracy"
      drills:
        warning:
          - name: "One-Foot Shooting"
            description: "Shoot while balancing on front foot only -- forces clean weight transfer"
            cue: "If you fall over, your weight transfer is off -- smooth and controlled"
      annotation:
        joint: "left_shoulder"
        short_label: "BALANCE"

    hands_from_body:
      display_name: "Hands Out Front"
      type: angle
      angle_function: hands_from_body
      per_side: false
      # Normalized by shoulder width. Hands should be away from body for power.
      good_range: [0.8, 2.0]
      warning_range: [0.5, 2.5]
      feedback:
        good: "Hands out in front -- good power position"
        warning: "Hands too close to body -- limiting stick flex and power"
        poor: "Hands tucked in -- cannot generate power. Get hands OUT"
      drills:
        warning:
          - name: "Extended Shooting Drill"
            description: "Practice shooting with arms fully extended before pulling top hand"
            cue: "Reach out, THEN pull -- the further out you start, the more flex you get"
        poor:
          - name: "No-Puck Shooting Form"
            description: "Practice shooting motion without puck. Focus on hand extension."
            cue: "If your elbows are bent at your sides, you have zero power"
      annotation:
        joint: "left_wrist"
        short_label: "HANDS"

    stick_follow_through:
      display_name: "Follow Through"
      type: angle
      angle_function: stick_angle_proxy
      per_side: false
      # Angle of wrist-to-wrist line. During follow-through, should point toward target.
      good_range: [-20, 35]
      warning_range: [-40, 50]
      feedback:
        good: "Good follow-through toward target"
        warning: "Follow-through direction off -- point stick at the target"
        poor: "No follow-through -- losing accuracy and power"
      drills:
        warning:
          - name: "Freeze Frame Follow-Through"
            description: "Shoot and freeze at end of follow-through. Check: is your stick pointing at the target?"
            cue: "Where your stick finishes is where the puck goes"
      annotation:
        joint: "right_wrist"
        short_label: "FOLLOW"

  coaching_notes:
    - "Hands shoulder-width apart, away from body"
    - "Puck starts on heel of blade, transfers to toe during release"
    - "Weight shifts from back foot to front foot through the shot"
    - "Top hand pulls, bottom hand pushes -- flex the stick shaft"
    - "Trunk rotation generates power -- greater rotation = faster shot"
    - "Follow through toward target with shoulders, arms, and stick"
    - "Puck should be in the shooting box -- about a foot off the skates"
    - "The wrist shot is the most accurate shot type (23-37% of all shots taken)"

  settings:
    min_visibility: 0.5
    analyze_sides: both
