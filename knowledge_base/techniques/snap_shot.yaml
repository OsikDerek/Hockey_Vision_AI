# Snap Shot Technique — Coaching Knowledge Base
# ==============================================
# Basic technique definitions. Derek: specialize these.
#
# NOTE: Like wrist shot, full analysis needs stick/puck tracking later.
# Body mechanics only for now — stance, weight transfer, rotation.

technique:
  name: snap_shot
  display_name: "Snap Shot"
  description: "Snap shot body mechanics — quick release, weight transfer, and follow-through"

  detection:
    detector: FrameByFrame
    params:
      min_visibility: 0.5
      analyze_sides: both

  checks:
    knee_angle:
      display_name: "Shooting Stance"
      type: angle
      angle_function: knee_angle
      per_side: true
      # Snap shot needs stable, slightly bent base
      good_range: [100, 145]
      warning_range: [85, 160]
      feedback:
        good: "Stable shooting stance -- good base for quick release"
        warning: "Adjust knee bend for better stability"
        poor: "Unstable base -- losing power and accuracy on snap shot"
      drills:
        warning:
          - name: "Quick Release Stance Drill"
            description: "Get into shooting stance, hold 3 seconds, snap release. Repeat 20x."
            cue: "Knees bent, chest facing the net -- this is your shooting platform"
        poor:
          - name: "Wall Sit with Stick"
            description: "Hold wall sit position with stick in shooting position. Build the stance."
            cue: "If your legs are straight, you have no power base"
      annotation:
        joint: "{side}_knee"
        short_label: "STANCE"

    hip_angle:
      display_name: "Hip Rotation"
      type: angle
      angle_function: hip_angle
      per_side: true
      good_range: [65, 125]
      warning_range: [50, 145]
      feedback:
        good: "Good hip engagement in snap shot"
        warning: "More hip rotation for power -- snap comes from the core"
        poor: "All arms, no hips -- losing snap shot power"
      drills:
        warning:
          - name: "Hip Snap Drill"
            description: "Practice snap shot motion without puck, focusing on hip snap"
            cue: "The snap in snap shot comes from your HIPS, not your wrists"
        poor:
          - name: "Rotation Band Work (Off-Ice)"
            description: "Resistance band rotational exercises mimicking snap shot motion"
            cue: "Hips lead, shoulders follow, hands finish -- feel the chain"
      annotation:
        joint: "{side}_hip"
        short_label: "HIPS"

    forward_lean:
      display_name: "Chest Position"
      type: angle
      angle_function: forward_lean_angle
      per_side: false
      good_range: [15, 45]
      warning_range: [5, 55]
      feedback:
        good: "Chest facing target -- good snap shot position"
        warning: "Adjust chest angle -- should be facing the net"
        poor: "Chest not facing target -- losing accuracy"
      drills:
        warning:
          - name: "Target Focus Shooting"
            description: "Shoot at small targets, focusing on keeping chest squared to target"
            cue: "Chest to the net -- where your chest points, the puck goes"
      annotation:
        joint: "left_shoulder"
        short_label: "CHEST"

    trunk_alignment:
      display_name: "Weight Transfer"
      type: angle
      angle_function: trunk_alignment
      per_side: false
      good_range: [-12, 12]
      warning_range: [-20, 20]
      feedback:
        good: "Clean weight transfer through snap shot"
        warning: "Weight transfer off-balance"
        poor: "Falling off-balance during shot -- losing accuracy"
      drills:
        warning:
          - name: "One-Leg Snap Shots"
            description: "Shoot snap shots while lifting back foot slightly off ice after release"
            cue: "If you can balance on your front foot after the shot, your transfer was clean"
      annotation:
        joint: "left_shoulder"
        short_label: "BALANCE"

    hands_from_body:
      display_name: "Hands Out Front"
      type: angle
      angle_function: hands_from_body
      per_side: false
      good_range: [0.7, 2.0]
      warning_range: [0.4, 2.5]
      feedback:
        good: "Hands out in front -- good snap shot position"
        warning: "Hands too close to body -- losing snap power"
        poor: "Hands tucked in -- the snap comes from arm extension. Get hands OUT"
      drills:
        warning:
          - name: "Extended Snap Release"
            description: "Focus on getting top hand well ahead of body before snapping"
            cue: "The further out your top hand starts, the more snap you generate"
      annotation:
        joint: "left_wrist"
        short_label: "HANDS"

  coaching_notes:
    - "Puck starts on the TOE of the blade (unlike wrist shot which starts at heel)"
    - "Snap from toe to middle of blade while pressing down on bottom hand"
    - "Chest faces the net -- the snap shot is a quick-release shot"
    - "Weight transfers to the leg CLOSEST to the blade"
    - "Top hand pulls hard toward body, bottom hand pushes toward target"
    - "Get top hand out well ahead of body -- this generates the snapping motion"
    - "The snap shot is faster to release than a wrist shot but sacrifices some accuracy"
    - "Hands away from body -- cannot generate power with hands tucked in"

  settings:
    min_visibility: 0.5
    analyze_sides: both
