# Hockey Skating Mechanics Configuration
# =========================================
# Defines ideal angle ranges for skating technique evaluation.
# Adjust these thresholds based on your coaching expertise.
#
# Ratings:
#   good    = angle within good_range
#   warning = angle within warning_range but outside good_range
#   poor    = angle outside warning_range
#
# All angles in degrees.

mechanics:
  knee_angle:
    display_name: "Knee Bend"
    good_range: [95, 125]
    warning_range: [80, 140]
    feedback:
      good: "Strong knee bend — good power position"
      warning: "Knee bend could be deeper for more power"
      poor: "Insufficient knee bend — losing stride power"

  hip_angle:
    display_name: "Hip Hinge"
    good_range: [70, 110]
    warning_range: [55, 130]
    feedback:
      good: "Good hip position"
      warning: "Adjust hip hinge depth"
      poor: "Hip position compromising stride efficiency"

  forward_lean:
    display_name: "Forward Lean"
    good_range: [30, 50]
    warning_range: [20, 60]
    feedback:
      good: "Good forward lean — efficient posture"
      warning: "Adjust torso angle for better balance"
      poor: "Too upright — losing speed and edge pressure"

  ankle_dorsiflexion:
    display_name: "Ankle Flex"
    good_range: [70, 95]
    warning_range: [60, 110]
    feedback:
      good: "Good ankle engagement on edges"
      warning: "More ankle flex needed for edge control"
      poor: "Ankles too stiff — poor edge engagement"

  trunk_alignment:
    display_name: "Trunk Balance"
    good_range: [-8, 8]
    warning_range: [-15, 15]
    feedback:
      good: "Balanced posture"
      warning: "Slight lateral lean — check balance"
      poor: "Significant balance issue — center of gravity off"

# Stride-level mechanics (evaluated per stride cycle, not per frame)
stride_mechanics:
  push_off_extension:
    display_name: "Push-off Extension"
    good_range: [155, 180]
    warning_range: [140, 180]
    feedback:
      good: "Full leg extension — maximizing push-off power"
      warning: "Incomplete extension — leaving power on the table"
      poor: "Very short push-off — significant power loss"

  glide_knee_bend:
    display_name: "Glide Knee Bend"
    good_range: [90, 130]
    warning_range: [80, 150]
    feedback:
      good: "Deep knee bend in glide — good power position"
      warning: "Standing too tall in glide — losing edge pressure"
      poor: "Legs nearly straight — no power loaded for next stride"

  stride_range_of_motion:
    display_name: "Stride ROM"
    good_range: [30, 80]
    warning_range: [20, 95]
    feedback:
      good: "Good range of motion through the stride"
      warning: "Limited stride ROM — could generate more power"
      poor: "Very restricted ROM — check flexibility and technique"

  symmetry:
    display_name: "L/R Symmetry"
    good_range: [0.90, 1.0]
    warning_range: [0.80, 1.0]
    feedback:
      good: "Balanced stride between both legs"
      warning: "Slight imbalance — one side weaker"
      poor: "Significant asymmetry — risk of compensation injuries"

# Visibility threshold for landmark confidence
min_visibility: 0.5

# Which sides to analyze (both, left, right)
analyze_sides: both
